<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
.daf-ms-section {
    padding: 120px 0;
    background-color: #0A0C10 !important;
    position: relative;
    z-index: 10;
    width: 100%;
    overflow: hidden;
}

.daf-ms-header {
    text-align: center;
    margin-bottom: 100px; 
    position: relative;
    z-index: 20;
}

.daf-ms-container {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    padding: 0 20px;
    min-height: 600px; 
    overflow: visible; 
}

.daf-ms-title {
    font-family: 'Unbounded', sans-serif;
    color: #FFFFFF;
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 800;
}
.daf-ms-title span { color: #FF6300; }

.daf-ms-card {
    position: absolute;
    border-radius: 24px;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background-color: #16181D;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    opacity: 0;
    overflow: hidden;
    cursor: zoom-in;
    will-change: transform, opacity;
    backface-visibility: hidden;
}

@media (max-width: 640px) {
    .daf-ms-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
        min-height: auto !important;
    }
    .daf-ms-card {
        position: relative !important;
        width: 100% !important;
        height: 350px !important;
        opacity: 1 !important;
        transform: none !important;
        left: auto !important;
        top: auto !important;
        x: 0 !important;
        y: 0 !important;
    }
}
</style>

<div class="daf-ms-section">
    <div class="daf-ms-header">
        <h2 class="daf-ms-title">Наш склад <span>изнутри</span></h2>
    </div>
    <div class="daf-ms-container" id="dafMasonry"></div>
</div>

<script>
window.addEventListener('load', function() {
    gsap.registerPlugin(ScrollTrigger);

    const data = [
        { img: 'https://static.tildacdn.com/tild6537-6462-4138-b737-633331643664/4.png', ratio: 1.3 },
        { img: 'https://static.tildacdn.com/tild3164-3662-4165-b939-626535653062/2.png', ratio: 0.9 },
        { img: 'https://static.tildacdn.com/tild3363-3837-4364-b335-393066653064/8.png', ratio: 1.5 },
        { img: 'https://static.tildacdn.com/tild6537-6164-4661-b462-396339323134/5.png', ratio: 1.1 },
        { img: 'https://static.tildacdn.com/tild3239-3137-4261-b765-366161366534/3.png', ratio: 1.2 },
        { img: 'https://static.tildacdn.com/tild6536-3461-4864-a133-393165663063/9.png', ratio: 1.0 },
        { img: 'https://static.tildacdn.com/tild3030-3939-4431-b131-383863353238/6.png', ratio: 1.6 },
        { img: 'https://static.tildacdn.com/tild6331-3939-4265-a431-663631303166/7.png', ratio: 1.1 }
    ];

    const container = document.getElementById('dafMasonry');
    
    data.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'daf-ms-card';
        card.style.backgroundImage = `url(${item.img})`;
        container.appendChild(card);
    });

    function doLayout(isInitial = false) {
        if (window.innerWidth <= 640) return;

        const width = container.offsetWidth - 40;
        const cols = width > 900 ? 4 : 2;
        const gap = 20;
        const colW = (width - (gap * (cols - 1))) / cols;
        const colHeights = new Array(cols).fill(0);

        const cards = container.querySelectorAll('.daf-ms-card');
        cards.forEach((card, i) => {
            const shortestCol = colHeights.indexOf(Math.min(...colHeights));
            const x = shortestCol * (colW + gap);
            const y = colHeights[shortestCol];
            const h = colW * data[i].ratio;

            if (isInitial) {
                gsap.set(card, {
                    width: colW,
                    height: h,
                    x: x,
                    y: y,
                    opacity: 0
                });
            } else {
                gsap.to(card, {
                    width: colW,
                    height: h,
                    x: x,
                    y: y,
                    duration: 0.6,
                    ease: "power2.out"
                });
            }

            colHeights[shortestCol] += h + gap;
        });
        container.style.height = Math.max(...colHeights) + 'px';
    }

    doLayout(true);

    gsap.fromTo(".daf-ms-card", 
        { 
            y: "+=150",
            opacity: 0 
        },
        {
            y: "-=150",
            opacity: 1,
            stagger: 0.1,
            duration: 1,
            ease: "power3.out",
            scrollTrigger: {
                trigger: ".daf-ms-container",
                start: "top 80%",
                toggleActions: "play none none none"
            }
        }
    );

    window.addEventListener('resize', () => doLayout(false));
    setTimeout(() => { doLayout(false); ScrollTrigger.refresh(); }, 1000);
});
</script>
