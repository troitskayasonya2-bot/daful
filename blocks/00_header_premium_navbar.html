<style>
/* ========== CSS ========== */
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap');

.pn-nav {
  --pn-bg-from: rgba(30, 30, 30, 0.45);
  --pn-bg-to: rgba(42, 42, 42, 0.5);
  --pn-text: #fff;
  --pn-accent: #FF6A00;
  --pn-accent-hover: #ff7a1a;
  font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 9999;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.pn-nav__bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, var(--pn-bg-from) 0%, var(--pn-bg-to) 100%);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.pn-nav__in {
  position: relative;
  width: 100%;
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}

.pn-nav__logo {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  text-decoration: none;
  line-height: 0;
}
.pn-nav__logo-img {
  height: 34px;
  width: auto;
  display: block;
  object-fit: contain;
}

.pn-nav__menu {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 42px;
  list-style: none;
  margin: 0;
  padding: 0;
  height: 100%;
}
.pn-nav__menu li {
  display: flex;
  align-items: center;
  justify-content: center;
}

.pn-nav__link {
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: #fff !important;
  text-decoration: none !important;
  padding: 6px 0;
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s ease;
}
.pn-nav__link::after {
  content: '';
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 2px;
  background: var(--pn-accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s ease;
}
.pn-nav__link:hover,
.pn-nav__link:focus {
  color: #fff !important;
}
.pn-nav__link:hover::after {
  transform: scaleX(1);
}

.pn-nav__cta {
  flex-shrink: 0;
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 26px;
  font-size: 15px;
  font-weight: 700;
  color: var(--pn-accent) !important;
  background: transparent;
  text-decoration: none;
  border: 2px solid var(--pn-accent);
  border-radius: 999px;
  overflow: hidden;
  transition: color 0.22s ease, transform 0.25s ease, box-shadow 0.25s ease;
  z-index: 1;
}
.pn-nav__cta::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 100%;
  background: var(--pn-accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.28s ease;
  z-index: -1;
}
.pn-nav__cta:hover {
  color: #fff !important;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255, 106, 0, 0.35);
}
.pn-nav__cta:hover::before {
  transform: scaleX(1);
}
.pn-nav__cta:active {
  transform: translateY(0);
}

.pn-nav__burger {
  display: none;
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 6px;
  padding: 0;
  border: none;
  background: transparent;
  cursor: pointer;
  color: #fff;
}
.pn-nav__burger-line {
  display: block;
  width: 22px;
  height: 2px;
  background: currentColor;
  border-radius: 1px;
  transition: transform 0.25s ease, opacity 0.25s ease;
}
.pn-nav__burger.is-open .pn-nav__burger-line:nth-child(1) {
  transform: translateY(8px) rotate(45deg);
}
.pn-nav__burger.is-open .pn-nav__burger-line:nth-child(2) {
  opacity: 0;
}
.pn-nav__burger.is-open .pn-nav__burger-line:nth-child(3) {
  transform: translateY(-8px) rotate(-45deg);
}

/* Drawer */
.pn-nav__drawer {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 10000;
  pointer-events: none;
  visibility: hidden;
  transition: visibility 0.3s ease;
}
.pn-nav__drawer.is-open {
  pointer-events: auto;
  visibility: visible;
}
.pn-nav__drawer-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.pn-nav__drawer.is-open .pn-nav__drawer-backdrop {
  opacity: 1;
}
.pn-nav__drawer-panel {
  position: absolute;
  top: 0;
  right: 0;
  width: 100%;
  max-width: 320px;
  height: 100%;
  background: linear-gradient(180deg, var(--pn-bg-from) 0%, var(--pn-bg-to) 100%);
  padding: 64px 24px 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: -8px 0 32px rgba(0, 0, 0, 0.3);
}
.pn-nav__drawer.is-open .pn-nav__drawer-panel {
  transform: translateX(0);
}
.pn-nav__drawer-menu {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.pn-nav__drawer-link {
  display: block;
  padding: 14px 0;
  font-size: 18px;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: #fff !important;
  text-decoration: none !important;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  transition: color 0.2s ease;
}
.pn-nav__drawer-link:hover {
  color: var(--pn-accent) !important;
}
.pn-nav__drawer-cta {
  margin-top: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 28px;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  background: var(--pn-accent);
  text-decoration: none;
  border-radius: 999px;
  box-shadow: 0 8px 24px rgba(255, 106, 0, 0.35);
  transition: background 0.25s ease;
}
.pn-nav__drawer-cta:hover {
  background: var(--pn-accent-hover);
}

/* Спейсер не нужен: бар фиксирован и наезжает на первый экран */
.pn-nav__spacer {
  height: 0;
  flex-shrink: 0;
  overflow: hidden;
}

/* Tablet */
@media (max-width: 1024px) {
  .pn-nav__menu { gap: 28px; }
  .pn-nav__cta { padding: 12px 22px; font-size: 14px; }
}

/* Mobile */
@media (max-width: 768px) {
  .pn-nav__menu,
  .pn-nav__cta { display: none !important; }
  .pn-nav__burger { display: flex; }
  .pn-nav__in { padding: 0 16px; }
}
</style>

<script>
/* ========== JS ========== */
(function() {
  var nav = document.getElementById('pn-nav');
  var burger = document.getElementById('pn-burger');
  var drawer = document.getElementById('pn-drawer');
  var backdrop = document.getElementById('pn-drawer-backdrop');

  function openDrawer() {
    if (!drawer || !burger) return;
    drawer.classList.add('is-open');
    drawer.setAttribute('aria-hidden', 'false');
    burger.classList.add('is-open');
    burger.setAttribute('aria-expanded', 'true');
    burger.setAttribute('aria-label', 'Закрыть меню');
    document.body.style.overflow = 'hidden';
  }

  function closeDrawer() {
    if (!drawer || !burger) return;
    drawer.classList.remove('is-open');
    drawer.setAttribute('aria-hidden', 'true');
    burger.classList.remove('is-open');
    burger.setAttribute('aria-expanded', 'false');
    burger.setAttribute('aria-label', 'Открыть меню');
    document.body.style.overflow = '';
  }

  if (burger) {
    burger.addEventListener('click', function() {
      if (drawer.classList.contains('is-open')) closeDrawer();
      else openDrawer();
    });
  }
  if (backdrop) {
    backdrop.addEventListener('click', closeDrawer);
  }

  var drawerLinks = drawer && drawer.querySelectorAll('.pn-nav__drawer-link, .pn-nav__drawer-cta');
  if (drawerLinks && drawerLinks.length) {
    drawerLinks.forEach(function(link) {
      link.addEventListener('click', function() {
        closeDrawer();
      });
    });
  }

  /* Плавный скролл к якорям */
  document.addEventListener('click', function(e) {
    var a = e.target.closest('a[href^="#"]');
    if (!a || a.getAttribute('href') === '#') return;
    var id = a.getAttribute('href').slice(1);
    if (!id) return;
    var el = document.getElementById(id);
    if (el) {
      e.preventDefault();
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
})();
</script>
