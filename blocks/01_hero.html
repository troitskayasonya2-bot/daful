<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;800&family=Montserrat:wght@400;500;600;700&display=swap');

.daf-hero-wrap {
    position: relative !important;
    width: 100% !important;
    height: 100vh !important;
    min-height: 750px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    background-color: #0A0C10 !important;
    font-family: 'Unbounded', sans-serif !important;
    overflow: hidden !important;
    box-sizing: border-box !important;
}
.daf-hero-bg {
    position: absolute; inset: 0; z-index: 1;
    background: url('https://static.tildacdn.com/tild6566-6538-4637-a634-326535613938/Gemini_Generated_Ima.png') center/cover no-repeat;
    filter: brightness(0.45);
}
.daf-hero-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,12,16,0.15) 0%, rgba(10,12,16,0.85) 100%); z-index: 2; }
.daf-hero-inner {
    position: relative; z-index: 20; text-align: center; margin-top: -80px;
    width: 100%; max-width: 1240px; padding: 0 20px; box-sizing: border-box;
    display: flex; flex-direction: column; align-items: center;
}
.daf-hero-title {
    font-size: clamp(45px, 8vw, 92px) !important; font-weight: 800 !important;
    color: #fff !important; text-transform: uppercase !important;
    line-height: 1.05 !important; margin-bottom: 50px !important; letter-spacing: -0.02em !important;
}
.daf-hero-title span { color: #FF6300 !important; display: block; }
.daf-hero-btn {
    display: inline-flex !important; align-items: center; gap: 14px; padding: 24px 110px !important;
    background: #FF6300 !important; color: #FFFFFF !important;
    text-decoration: none !important; font-size: 17px !important;
    font-weight: 800 !important; text-transform: uppercase !important;
    border-radius: 100px !important; cursor: pointer !important;
    animation: dafPulseFix 2.5s infinite ease-in-out, dafBtnGlow 3s infinite ease-in-out !important;
    transition: background 0.3s ease, transform 0.15s ease !important;
    position: relative; overflow: hidden;
}
.daf-hero-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: none;
}
.daf-hero-btn:hover {
    background: #e85a00 !important;
    transform: scale(1.04) !important;
    animation: none !important;
    box-shadow: 0 0 40px rgba(255, 99, 0, 0.5) !important;
}
.daf-hero-btn:hover::before {
    animation: dafShine 0.6s ease forwards;
}
.daf-hero-btn:active {
    transform: scale(0.98) !important;
}
@keyframes dafShine {
    to { transform: translateX(100%); }
}
.daf-hero-desc {
    font-family: 'Montserrat', sans-serif !important; font-size: 18px !important;
    font-weight: 600 !important;
    color: rgba(255,255,255,0.7) !important; margin: 40px auto 0 !important;
    max-width: 500px !important; line-height: 1.5 !important;
}

/* ===== ПАРЯЩИЕ ЛОГО СЛЕВА ===== */
.daf-floating-logos {
    position: absolute; left: calc(50% - 620px); top: 50%; transform: translateY(-20%);
    z-index: 25; display: flex; flex-direction: row; align-items: flex-start; gap: 20px;
    animation: dafFloat 4s ease-in-out infinite;
}
.daf-floating-logos img {
    height: 130px; width: auto; object-fit: contain;
    opacity: 0.9;
    transition: opacity 0.3s ease, transform 0.3s ease;
}
.daf-floating-logos img:hover {
    opacity: 1; transform: scale(1.06);
}
.daf-floating-logos img:first-child {
    transform: rotate(-6deg) translateY(-15px);
}
.daf-floating-logos img:last-child {
    transform: rotate(6deg) translateY(15px);
}
.daf-floating-logos img:first-child:hover {
    transform: rotate(-6deg) translateY(-15px) scale(1.06);
}
.daf-floating-logos img:last-child:hover {
    transform: rotate(6deg) translateY(15px) scale(1.06);
}
@keyframes dafFloat {
    0%, 100% { transform: translateY(-20%); }
    50% { transform: translateY(calc(-20% - 8px)); }
}

.daf-bottom-band {
    position: absolute; bottom: 0; left: 0; width: 100%; z-index: 10;
    padding: 0 20px 90px; box-sizing: border-box;
    display: flex; justify-content: center;
}
.daf-band-inner {
    width: 100%; max-width: 1240px; position: relative;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 32px 0;
    display: flex; align-items: center;
    overflow: hidden;
}
.daf-band-inner::before {
    content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 0;
    border-top: 1px dashed rgba(255,255,255,0.08);
}
.daf-band-inner::after {
    content: ''; position: absolute; top: 10px; left: 12px;
    width: 60px; height: calc(100% - 20px);
    border: 1px dashed rgba(255,99,0,0.12); border-radius: 10px;
    pointer-events: none;
}
.daf-band-item {
    flex: 1; padding: 0 36px;
    display: flex; align-items: center; gap: 18px;
    position: relative; z-index: 2;
}
.daf-band-item + .daf-band-item::before {
    content: ''; position: absolute; left: 0; top: -8px;
    height: calc(100% + 16px); width: 0;
    border-left: 1px dashed rgba(255,255,255,0.1);
}
.daf-band-ico {
    width: 50px; height: 50px; flex-shrink: 0; position: relative;
    display: flex; align-items: center; justify-content: center;
}
.daf-band-ico::before {
    content: ''; position: absolute; inset: 0;
    border: 1.5px dashed rgba(255,99,0,0.35); border-radius: 50%;
}
.daf-band-ico svg { width: 22px; height: 22px; stroke: #FF6300; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; position: relative; z-index: 1; }
.daf-band-ico::after {
    content: ''; position: absolute; top: -2px; right: -2px;
    width: 8px; height: 8px; border-radius: 50%;
    background: #FF6300; box-shadow: 0 0 10px rgba(255,99,0,0.5);
}
.daf-band-val {
    font-family: 'Unbounded', sans-serif; font-size: 20px; font-weight: 800;
    color: #fff; line-height: 1.15; margin-bottom: 3px;
}
.daf-band-val em { font-style: normal; color: #FF6300; }
.daf-band-lbl {
    font-family: 'Montserrat', sans-serif; font-size: 12px;
    color: rgba(255,255,255,0.4); line-height: 1.4; font-weight: 500;
}
.daf-route-dot {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,99,0,0.3);
    box-shadow: 12px 0 0 rgba(255,99,0,0.2), 24px 0 0 rgba(255,99,0,0.1);
}

@keyframes dafPulseFix {
    0% { transform: scale(1); }
    50% { transform: scale(1.03); }
    100% { transform: scale(1); }
}
@keyframes dafBtnGlow {
    0%, 100% { box-shadow: 0 0 20px rgba(255, 99, 0, 0.3); }
    50% { box-shadow: 0 0 35px rgba(255, 99, 0, 0.5); }
}

@media (max-width: 1440px) {
    .daf-floating-logos { left: 20px; }
}
@media (max-width: 1024px) {
    .daf-floating-logos { left: 20px; gap: 14px; }
    .daf-floating-logos img { height: 90px; }
    .daf-bottom-band { padding: 0 16px 90px; }
    .daf-band-item { padding: 0 24px; gap: 14px; }
    .daf-band-val { font-size: 17px; }
    .daf-band-inner::after { display: none; }
}
/* Планшет */
@media (max-width: 768px) {
    .daf-floating-logos { display: none; }
    .daf-hero-inner { margin-top: -100px !important; padding: 0 24px; }
    .daf-hero-title { font-size: 44px !important; margin-bottom: 26px !important; line-height: 1.1 !important; }
    .daf-hero-btn {
        width: auto !important; max-width: 100%;
        padding: 16px 44px !important; min-height: 50px;
        justify-content: center; font-size: 14px !important;
    }
    .daf-hero-desc { font-size: 14px !important; margin-top: 22px !important; max-width: 340px !important; padding: 0 8px; }
    .daf-bottom-band { position: absolute; bottom: 70px !important; padding: 0 16px; }
    .daf-band-inner {
        flex-direction: column; padding: 24px 24px; gap: 20px; align-items: flex-start;
        border-radius: 16px;
    }
    .daf-band-item { padding: 0; }
    .daf-band-item + .daf-band-item::before {
        left: 0; top: -10px; height: 0; width: 100%;
        border-left: none; border-top: 1px dashed rgba(255,255,255,0.08);
    }
    .daf-band-inner::before,
    .daf-band-inner::after { display: none; }
    .daf-route-dot { display: none; }
    .daf-hero-wrap { min-height: 750px !important; }
}

/* Мобилка */
@media (max-width: 480px) {
    .daf-hero-wrap {
        min-height: 100dvh !important;
        min-height: 100vh !important;
        min-height: -webkit-fill-available !important;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .daf-hero-inner { padding: 0 16px; margin-top: -130px !important; }
    .daf-hero-title {
        font-size: clamp(26px, 8vw, 32px) !important;
        margin-bottom: 18px !important;
        line-height: 1.08 !important;
        letter-spacing: -0.03em !important;
    }
    .daf-hero-btn {
        width: auto !important; max-width: 280px;
        padding: 14px 28px !important; min-height: 46px;
        font-size: 13px !important; gap: 9px;
        border-radius: 50px !important;
    }
    .daf-hero-btn svg { width: 17px; height: 17px; flex-shrink: 0; }
    .daf-hero-desc {
        font-size: 13px !important; margin-top: 16px !important;
        max-width: 100% !important; padding: 0 4px;
    }
    .daf-bottom-band {
        position: absolute;
        bottom: 50px !important;
        padding: 0 12px;
    }
    .daf-band-inner {
        padding: 20px 16px; gap: 16px;
        border-radius: 14px;
    }
    .daf-band-item { gap: 14px; }
    .daf-band-val { font-size: 14px !important; }
    .daf-band-lbl { font-size: 11px !important; }
    .daf-band-ico { width: 40px; height: 40px; flex-shrink: 0; }
    .daf-band-ico svg { width: 18px; height: 18px; }
}

/* Очень узкие экраны */
@media (max-width: 360px) {
    .daf-hero-inner { margin-top: -100px !important; }
    .daf-hero-title { font-size: 24px !important; margin-bottom: 14px !important; }
    .daf-hero-btn { font-size: 12px !important; padding: 12px 22px !important; min-height: 44px; max-width: 250px; }
    .daf-hero-btn svg { width: 16px; height: 16px; }
    .daf-hero-desc { font-size: 12px !important; margin-top: 14px !important; }
    .daf-band-val { font-size: 13px !important; }
    .daf-band-inner { padding: 16px 12px; gap: 14px; }
    .daf-bottom-band { bottom: 30px !important; }
}
</style>

                    <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="M9 12l2 2 4-4"></path></svg>
