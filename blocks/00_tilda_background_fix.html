<!-- ==============================================
     ФИКС: чтобы у всех блоков на странице был виден фон.

     ВАЖНО: в Tilda вставьте этот блок в "Дополнительный код" →
     "Перед закрывающим тегом </body>" (в конец страницы).
     Тогда наши стили загрузятся ПОСЛЕ tilda-blocks-page....min.css
     и не будут перебиваться стилями Tilda.

     Не вставляйте в "Стили (CSS)" в <head> — там они загружаются
     раньше Tilda и переопределяются.
     ============================================== -->

<style>
/* 1. Фон страницы */
body, #all, #allrecords { background: #fff !important; }

/* 2. Обёртки Tilda: прозрачные, чтобы не перекрывать блоки */
[id^="rec"],
[id^="rec"] > div,
.t-rec,
.t123,
.t-container_100,
.t-width { background: transparent !important; }

/* 3. Фон блоков — ВЫСОКАЯ СПЕЦИФИЧНОСТЬ (id + класс), чтобы перебить Tilda */
[id^="rec"] .daf-placeholder-white,
[id^="rec"] .dafull-services,
[id^="rec"] .dafull-cases,
[id^="rec"] .dafull-faq,
[id^="rec"] .dafull-warehouse,
[id^="rec"] .dafull-pains,
[id^="rec"] .dafull-pricing,
[id^="rec"] .dafull-process,
[id^="rec"] .dafull-trust,
[id^="rec"] .dafull-cta,
[id^="rec"] .dafull-cta-final,
[id^="rec"] .daf-benefits__panel-shape,
[id^="rec"] .daf-services,
[id^="rec"] .daf-about {
  background-color: #fff !important;
  box-shadow: none !important;
}
[id^="rec"] .dafull-process,
[id^="rec"] .dafull-pricing,
[id^="rec"] .dafull-pains,
[id^="rec"] .dafull-trust { background-color: #FAFAFA !important; }
[id^="rec"] .dafull-cta,
[id^="rec"] .dafull-cta-final { background-color: #13161F !important; }

/* 4. Запасной вариант: inset box-shadow (сложнее переопределить) */
[id^="rec"] .daf-placeholder-white,
[id^="rec"] .dafull-services,
[id^="rec"] .dafull-cases,
[id^="rec"] .dafull-faq,
[id^="rec"] .dafull-warehouse,
[id^="rec"] .daf-benefits__panel-shape,
[id^="rec"] .daf-services,
[id^="rec"] .daf-about {
  box-shadow: inset 0 0 0 9999px #fff !important;
}
[id^="rec"] .dafull-process,
[id^="rec"] .dafull-pricing,
[id^="rec"] .dafull-pains,
[id^="rec"] .dafull-trust {
  box-shadow: inset 0 0 0 9999px #FAFAFA !important;
}
[id^="rec"] .dafull-cta,
[id^="rec"] .dafull-cta-final {
  box-shadow: inset 0 0 0 9999px #13161F !important;
}

/* 5. Блок сразу после трапеции (daf-benefits-overlap): убираем «дырку», через которую виден первый экран.
   Класс daf-follows-overlap добавляйте ТОЛЬКО на корневой элемент того блока, который в Tilda идёт первым после блока с трапецией. */
.daf-follows-overlap {
  margin-top: -420px !important;
  position: relative;
  z-index: 45;
}
/* Белая «заплатка» над блоком — закрывает дырку, даже если Tilda добавляет отступы */
.daf-follows-overlap::before {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  bottom: 100%;
  height: 450px;
  background: #fff !important;
  pointer-events: none;
}

/* 6. Обёртки Tilda вокруг такого блока — без верхнего отступа */
[id^="rec"]:has(.daf-follows-overlap),
[id^="rec"]:has(.daf-follows-overlap) > div,
[id^="rec"]:has(.daf-follows-overlap) .t396,
[id^="rec"]:has(.daf-follows-overlap) .t-container,
[id^="rec"]:has(.daf-follows-overlap) .t-col {
  padding-top: 0 !important;
  margin-top: 0 !important;
}

/* 7. Пустой блок-трапеция (дубликат без картинки): убираем высоту и отступы, чтобы не было зазора.
   На странице два Zero Block с трапецией — второй без контента создаёт «дырку». */
[id^="rec"]:has(.daf-benefits-overlap:not(:has(img))) {
  padding: 0 !important;
  margin: 0 !important;
  min-height: 0 !important;
  border: none !important;
}
[id^="rec"]:has(.daf-benefits-overlap:not(:has(img))) .t123,
[id^="rec"]:has(.daf-benefits-overlap:not(:has(img))) .t-container_100,
[id^="rec"]:has(.daf-benefits-overlap:not(:has(img))) .t-width {
  padding: 0 !important;
  margin: 0 !important;
  min-height: 0 !important;
}
[id^="rec"]:has(.daf-benefits-overlap:not(:has(img))) .daf-benefits-overlap {
  min-height: 0 !important;
  height: 0 !important;
  overflow: hidden !important;
  margin: 0 !important;
  padding: 0 !important;
}
</style>
