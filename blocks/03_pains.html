<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
.daf-sellers {
    position: relative;
    background: #0A0C10;
    padding: 100px 0 120px;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
}

/* Сетка фона */
.daf-sellers::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
}

/* Оранжевое свечение по центру */
.daf-sellers::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 300px;
    background: rgba(255, 99, 0, 0.08);
    filter: blur(100px);
    pointer-events: none;
}

.daf-sellers__wrap {
    max-width: 1240px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 2;
}

/* Заголовок — по центру, как остальные блоки */
.daf-sellers__head {
    text-align: center;
    margin-bottom: 56px;
}

.daf-sellers__title {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(32px, 4vw, 48px);
    font-weight: 700;
    color: #fff;
    line-height: 0.95;
    letter-spacing: -0.02em;
    margin: 0;
}

.daf-sellers__title span {
    color: #FF6300;
}

/* Сетка из 5 причин */
.daf-sellers__grid {
    display: grid;
    grid-template-columns: 1fr;
    border: 1px solid rgba(255, 255, 255, 0.08);
    margin-bottom: 0;
}

@media (min-width: 768px) {
    .daf-sellers__grid {
        grid-template-columns: repeat(5, 1fr);
    }
}

.daf-sellers__item {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px 24px;
    border-right: 1px solid rgba(255, 255, 255, 0.08);
    background: transparent;
    transition: background 0.3s ease;
    cursor: default;
}

.daf-sellers__item:last-child {
    border-right: none;
}

@media (max-width: 767px) {
    .daf-sellers__item {
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .daf-sellers__item:last-child {
        border-bottom: none;
    }
}

.daf-sellers__item:hover {
    background: rgba(255, 255, 255, 0.04);
}

/* Оранжевая линия снизу при наведении */
.daf-sellers__item::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    width: 0;
    background: #FF6300;
    transition: width 0.5s ease;
}

.daf-sellers__item:hover::after {
    width: 100%;
}

.daf-sellers__num {
    font-family: 'Unbounded', sans-serif;
    font-size: 2rem;
    line-height: 1;
    color: #FF6300;
    margin-bottom: 16px;
    display: block;
}

.daf-sellers__item-inner {
    flex: 1;
}

.daf-sellers__line {
    width: 32px;
    height: 2px;
    background: #FF6300;
    margin-bottom: 12px;
}

.daf-sellers__name {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    line-height: 1.35;
    text-transform: uppercase;
    letter-spacing: 0.02em;
}

/* Итоговая плашка — отступ от сетки */
.daf-sellers__cta {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    margin-top: 40px;
    padding: 28px 32px;
    background: #FF6300;
}

@media (min-width: 768px) {
    .daf-sellers__cta {
        flex-direction: row;
        justify-content: space-between;
        gap: 24px;
    }
}

.daf-sellers__cta-text {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.35em;
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(16px, 2vw, 22px);
    font-weight: 400;
    color: #000;
    letter-spacing: 0.03em;
    line-height: 1.1;
    text-transform: uppercase;
    margin: 0;
    text-align: center;
}

@media (min-width: 768px) {
    .daf-sellers__cta-text {
        justify-content: center;
        text-align: center;
    }
}

.daf-sellers__cta-logo {
    height: 0.9em;
    width: auto;
    vertical-align: middle;
    display: inline-block;
}

.daf-sellers__cta-btn {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 28px;
    background: #0A0C10;
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    text-decoration: none;
    border-radius: 9999px;
    transition: background 0.3s ease, color 0.3s ease;
    border: none;
    cursor: pointer;
}

.daf-sellers__cta-btn:hover {
    background: #fff;
    color: #0A0C10;
}

.daf-sellers__cta-btn svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
}
</style>

<section class="daf-sellers">
    <div class="daf-sellers__wrap">
        <div class="daf-sellers__head">
            <h2 class="daf-sellers__title">
                Почему селлеры<br>
                <span>теряют деньги?</span>
            </h2>
        </div>

        <div class="daf-sellers__grid">
            <div class="daf-sellers__item">
                <span class="daf-sellers__num">01</span>
                <div class="daf-sellers__item-inner">
                    <div class="daf-sellers__line"></div>
                    <p class="daf-sellers__name">Штрафы за неправильную маркировку</p>
                </div>
            </div>
            <div class="daf-sellers__item">
                <span class="daf-sellers__num">02</span>
                <div class="daf-sellers__item-inner">
                    <div class="daf-sellers__line"></div>
                    <p class="daf-sellers__name">Ошибки при сборке FBS</p>
                </div>
            </div>
            <div class="daf-sellers__item">
                <span class="daf-sellers__num">03</span>
                <div class="daf-sellers__item-inner">
                    <div class="daf-sellers__line"></div>
                    <p class="daf-sellers__name">Потери товара</p>
                </div>
            </div>
            <div class="daf-sellers__item">
                <span class="daf-sellers__num">04</span>
                <div class="daf-sellers__item-inner">
                    <div class="daf-sellers__line"></div>
                    <p class="daf-sellers__name">Задержки поставок</p>
                </div>
            </div>
            <div class="daf-sellers__item">
                <span class="daf-sellers__num">05</span>
                <div class="daf-sellers__item-inner">
                    <div class="daf-sellers__line"></div>
                    <p class="daf-sellers__name">Срыв слотов</p>
                </div>
            </div>
        </div>

        <div class="daf-sellers__cta">
            <p class="daf-sellers__cta-text">Освободите время для роста и развития бизнеса</p>
            <a href="#" onclick="openDafModal(); return false;" class="daf-sellers__cta-btn">
                Узнать подробнее
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
            </a>
        </div>
    </div>
</section>
