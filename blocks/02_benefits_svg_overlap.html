<!-- ==============================================
     Блок-трапеция: по умолчанию — SVG; если на странице есть #rec1951279651,
     скрипт подставит его контент вместо картинки. Блок всегда виден.
     Вставка: один Zero Block в Tilda.
     ============================================== -->

<div class="daf-benefits-overlap" id="daf-benefits-overlap-slot">
  <img
    src="https://static.tildacdn.com/tild3533-6536-4633-b461-356563613965/svg_1771842165268.svg"
    alt=""
    class="daf-benefits-overlap__img daf-benefits-overlap__fallback"
    width="1401"
    height="421"
    loading="eager"
  />
</div>

<style>
.daf-benefits-overlap {
  position: relative;
  z-index: 50;
  margin-top: calc(-33vh - 55px);
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
  overflow: visible;
  min-height: 1px;
}

/* Контент из rec1951279651 — виден и на всю ширину */
.daf-benefits-overlap > * {
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
  opacity: 1 !important;
  visibility: visible !important;
}

.daf-benefits-overlap img {
  width: 100%;
  height: auto;
  display: block;
  vertical-align: top;
}

/* Обёртки Tilda внутри слота — на всю ширину, без ограничений */
.daf-benefits-overlap .t123,
.daf-benefits-overlap .t-container_100,
.daf-benefits-overlap .t-width {
  max-width: none !important;
  width: 100% !important;
}
.daf-benefits-overlap .t-container_100 { padding: 0 !important; }
.daf-benefits-overlap .t-width { padding: 0 !important; }

@media (max-width: 768px) {
  .daf-benefits-overlap {
    margin-top: calc(-25vh - 55px);
  }
}

@media (max-width: 480px) {
  .daf-benefits-overlap {
    margin-top: calc(-22vh - 55px);
  }
}
</style>

<script>
(function() {
  function injectRecContent() {
    var rec = document.getElementById('rec1951279651');
    var slot = document.getElementById('daf-benefits-overlap-slot');
    if (!rec || !slot) return;
    var fallback = slot.querySelector('.daf-benefits-overlap__fallback');
    if (fallback) fallback.remove();
    while (rec.firstChild) {
      slot.appendChild(rec.firstChild);
    }
    rec.style.display = 'none';
    slot.classList.add('daf-benefits-overlap_has-content');
  }
  function run() {
    injectRecContent();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(run, 150);
    });
  } else {
    setTimeout(run, 150);
  }
  window.addEventListener('load', function() {
    var slot = document.getElementById('daf-benefits-overlap-slot');
    if (slot && !slot.classList.contains('daf-benefits-overlap_has-content')) {
      injectRecContent();
    }
  });
})();
</script>
