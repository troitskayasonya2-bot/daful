<!--
  Универсальная анимация появления по классу (Tilda)
  Вставка: Настройки страницы → Дополнительный код → Перед закрывающим тегом </body>

  Как использовать:
  В настройках нужного блока в поле "Класс для блока" (или "CSS class") добавьте:  dafull-animate-in
  Можно добавить этот класс нескольким блокам — все анимируются.
  Варианты класса (скопируйте один в "Класс для блока"):
  - dafull-animate-in       — появление снизу + лёгкое увеличение
  - dafull-animate-fade     — только плавное проявление
  - dafull-animate-up       — выезд снизу вверх
-->
<style>
  .dafull-animate-in {
    opacity: 0 !important;
    transform: scale(0.94) translateY(20px);
    animation: dafull-in 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .dafull-animate-fade {
    opacity: 0 !important;
    animation: dafull-fade 0.8s ease-out forwards;
  }
  .dafull-animate-up {
    opacity: 0 !important;
    transform: translateY(28px);
    animation: dafull-up 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes dafull-in {
    to { opacity: 1 !important; transform: scale(1) translateY(0); }
  }
  @keyframes dafull-fade {
    to { opacity: 1 !important; }
  }
  @keyframes dafull-up {
    to { opacity: 1 !important; transform: translateY(0); }
  }
</style>
